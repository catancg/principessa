<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Principessa Pastelería — Comunidad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', Arial, sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; background: #FBF4EE; color: #3D1F0F; }
    img.logo { display: block; margin: 0 auto 20px; max-width: 160px; height: auto; }
    h2 { font-size: 20px; font-weight: 900; margin: 0 0 6px; text-align: center; color: #6B3217; }
    p.subtitle { text-align: center; color: #7A5840; font-size: 14px; margin: 0 0 24px; }
    input, select, button {
      width: 100%; padding: 12px; margin-top: 12px; font-size: 16px;
      box-sizing: border-box; font-family: inherit;
    }
    input, select {
      border: 2px solid #E8D5C4; border-radius: 10px; background: #fff; color: #3D1F0F;
    }
    input:focus, select:focus { outline: none; border-color: #6B3217; }
    button { background: #6B3217; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    button:hover { opacity: .88; }
    #msg { text-align: center; margin-top: 16px; font-weight: 700; color: #6B3217; }
  </style>
</head>
<body>
  <img src="/static/logo.png" alt="Principessa Pastelería" class="logo" onerror="this.style.display='none'">
  <h2>Unite a nuestra comunidad</h2>
  <p class="subtitle">Recibí novedades, promos especiales y sorpresas dulces</p>

  <form id="form">
    <input placeholder="Tu nombre" name="name" required />
    <input placeholder="Tu email (ejemplo@gmail.com)" name="email" type="email" required />

    <p style="margin-top:16px;margin-bottom:0;font-size:13px;color:#7A5840;text-align:center;">¿Cuándo es tu cumpleaños? <span style="opacity:.65;">(opcional — para sorprenderte)</span></p>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <select name="birth_day" style="flex:1;margin-top:0;">
        <option value="">Día</option>
      </select>
      <select name="birth_month" style="flex:1;margin-top:0;">
        <option value="">Mes</option>
        <option value="1">Enero</option>
        <option value="2">Febrero</option>
        <option value="3">Marzo</option>
        <option value="4">Abril</option>
        <option value="5">Mayo</option>
        <option value="6">Junio</option>
        <option value="7">Julio</option>
        <option value="8">Agosto</option>
        <option value="9">Septiembre</option>
        <option value="10">Octubre</option>
        <option value="11">Noviembre</option>
        <option value="12">Diciembre</option>
      </select>
    </div>

    <button type="submit" style="margin-top: 20px;">Quiero recibir novedades</button>
  </form>

  <div id="done" style="display:none; text-align:center; padding: 12px 0;">
    <h2 id="done-heading" style="font-size:20px;font-weight:900;color:#6B3217;margin-bottom:10px;"></h2>
    <p id="done-body" style="color:#7A5840;font-size:14px;"></p>
  </div>

  <p id="msg" style="text-align:center;margin-top:16px;font-weight:700;color:#6B3217;"></p>

  <script>
    // Days per month (index 1-12), using 2000 as leap year so Feb has 29
    const DAYS_IN_MONTH = [0,31,29,31,30,31,30,31,31,30,31,30,31];

    function rebuildDays(maxDay, currentDay) {
      const sel = document.querySelector('select[name="birth_day"]');
      const prev = parseInt(sel.value, 10) || currentDay;
      while (sel.options.length > 1) sel.remove(1);
      for (let d = 1; d <= maxDay; d++) {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        sel.appendChild(o);
      }
      if (prev && prev <= maxDay) sel.value = prev;
    }

    rebuildDays(31, null);

    document.querySelector('select[name="birth_month"]').addEventListener('change', function() {
      const m = parseInt(this.value, 10);
      rebuildDays(m ? DAYS_IN_MONTH[m] : 31, null);
    });

    const form = document.getElementById("form");
    const done = document.getElementById("done");
    const msg  = document.getElementById("msg");

    function lockWithMessage(heading, body) {
      form.style.display = "none";
      document.getElementById("done-heading").textContent = heading;
      document.getElementById("done-body").textContent   = body;
      done.style.display = "";
    }

    form.onsubmit = async (e) => {
      e.preventDefault();
      const fd    = new FormData(form);
      const name  = (fd.get("name")  || "").toString().trim();
      const email = (fd.get("email") || "").toString().trim();
      const bdDay   = parseInt(fd.get("birth_day")   || "", 10) || null;
      const bdMonth = parseInt(fd.get("birth_month") || "", 10) || null;

      const payload = { name, email, interests: [], consent_promotions: true };
      if (bdDay && bdMonth) { payload.birth_day = bdDay; payload.birth_month = bdMonth; }

      const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        lockWithMessage(
          "¡Gracias por unirte a nuestra comunidad! 🎁",
          "Ahora vas a recibir nuestras novedades y sorpresas dulces."
        );
      } else if (res.status === 409) {
        lockWithMessage(
          "¡Ya estás suscripto/a a nuestra comunidad! 💛",
          ""
        );
      } else {
        msg.textContent = `Ocurrió un error. Probá nuevamente. (${res.status})`;
      }
    };
  </script>
</body>
</html>
