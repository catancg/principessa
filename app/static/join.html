<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Principessa Pastelería — Comunidad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', Arial, sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; background: #FBF4EE; color: #3D1F0F; }
    img.logo { display: block; margin: 0 auto 20px; max-width: 160px; height: auto; }
    h2 { font-size: 20px; font-weight: 900; margin: 0 0 6px; text-align: center; color: #6B3217; }
    p.subtitle { text-align: center; color: #7A5840; font-size: 14px; margin: 0 0 24px; }
    input, select, button {
      width: 100%; padding: 12px; margin-top: 12px; font-size: 16px;
      box-sizing: border-box; font-family: inherit;
    }
    input, select {
      border: 2px solid #E8D5C4; border-radius: 10px; background: #fff; color: #3D1F0F;
    }
    input:focus, select:focus { outline: none; border-color: #6B3217; }
    button { background: #6B3217; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    button:hover { opacity: .88; }
    #msg { text-align: center; margin-top: 16px; font-weight: 700; color: #6B3217; }
  </style>
</head>
<body>
  <img src="/static/logo.png" alt="Principessa Pastelería" class="logo" onerror="this.style.display='none'">
  <h2>Unite a nuestra comunidad</h2>
  <p class="subtitle">Recibí novedades, promos especiales y sorpresas dulces</p>

  <form id="form">
    <input placeholder="Tu nombre" name="name" required />
    <input placeholder="Tu email (ejemplo@gmail.com)" name="email" type="email" required />

    <button type="submit" style="margin-top: 20px;">Quiero recibir novedades</button>
  </form>

  <p id="msg"></p>

  <script>
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");

    form.onsubmit = async (e) => {
      e.preventDefault();

      const fd = new FormData(form);
      const name = (fd.get("name") || "").toString().trim();
      const email = (fd.get("email") || "").toString().trim();
      const interests = fd.getAll("interests").map(v => v.toString());

      const payload = { name, email, interests, consent_promotions: true };

      const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        msg.innerText = "¡Bienvenida a Principessa! Pronto vas a recibir nuestras novedades.";
        form.reset();
      } else {
        msg.innerText = `Ocurrió un error. Probá nuevamente. (${res.status})`;
      }
    };
  </script>
</body>
</html>
