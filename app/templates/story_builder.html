<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Builder — Pika Pika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #111827;
      color: #f9fafb;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ===== CONTROLS PANEL ===== */
    .controls {
      width: 296px;
      flex-shrink: 0;
      background: #1f2937;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .ctrl-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .ctrl-header h1 {
      font-size: 15px;
      font-weight: 800;
      color: #f9fafb;
      letter-spacing: -0.01em;
    }
    .ctrl-header p {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
    }

    .ctrl-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .ctrl-body::-webkit-scrollbar { width: 3px; }
    .ctrl-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .ctrl-footer {
      padding: 14px 20px 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .ctrl-section { margin-bottom: 18px; }

    .ctrl-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.38);
      margin-bottom: 8px;
    }

    /* Photo drop zone */
    .photo-drop {
      border: 1.5px dashed rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 76px;
      gap: 3px;
    }
    .photo-drop:hover { border-color: rgba(255,255,255,0.38); background: rgba(255,255,255,0.02); }
    .photo-drop.dragover { border-color: #e2b96f; background: rgba(226,185,111,0.06); }
    .photo-drop.has-photo { border-style: solid; border-color: rgba(255,255,255,0.14); }
    .drop-icon { font-size: 18px; }
    .drop-text { font-size: 12px; color: rgba(255,255,255,0.38); }
    .drop-hint { font-size: 10px; color: rgba(255,255,255,0.2); }
    .photo-thumb { width: 100%; height: 56px; object-fit: cover; border-radius: 6px; margin-bottom: 3px; }

    /* Layout picker */
    .layout-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .layout-card {
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.15s;
      background: rgba(255,255,255,0.02);
    }
    .layout-card:hover { border-color: rgba(255,255,255,0.28); }
    .layout-card.active { border-color: #e2b96f; background: rgba(226,185,111,0.07); }
    .layout-thumb { aspect-ratio: 9/16; overflow: hidden; }
    .layout-name {
      font-size: 9px;
      font-weight: 700;
      text-align: center;
      padding: 4px 2px 5px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.02em;
    }
    .layout-card.active .layout-name { color: #e2b96f; }

    /* Layout thumb visuals */
    .lt-fullbleed { width:100%;height:100%;background:linear-gradient(160deg,#1e3a5f,#334155);position:relative; }
    .lt-fullbleed::after { content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.72));  }
    .lt-fullbleed::before { content:'';position:absolute;bottom:24%;left:14%;right:14%;height:4px;background:rgba(255,255,255,0.75);border-radius:2px;z-index:1; }

    .lt-split { width:100%;height:100%;display:flex;flex-direction:column; }
    .lt-split-photo { flex:0.57;background:linear-gradient(160deg,#1e3a5f,#334155); }
    .lt-split-panel { flex:0.43;background:#e2b96f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px; }
    .lt-split-line1 { width:58%;height:4px;background:rgba(255,255,255,0.8);border-radius:2px; }
    .lt-split-line2 { width:38%;height:2px;background:rgba(255,255,255,0.5);border-radius:2px; }

    .lt-card { width:100%;height:100%;background:linear-gradient(160deg,#1e3a5f,#334155);display:flex;align-items:center;justify-content:center; }
    .lt-card-inner { width:74%;height:79%;background:#fff;border-radius:5px;display:flex;flex-direction:column;overflow:hidden; }
    .lt-card-photo-t { flex:0.55;background:linear-gradient(160deg,#93c5fd,#6d28d9); }
    .lt-card-text { flex:0.45;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px; }
    .lt-card-line1 { width:62%;height:3px;background:#1e3a5f;border-radius:2px; }
    .lt-card-line2 { width:42%;height:2px;background:rgba(0,0,0,0.18);border-radius:2px; }

    /* Color swatches */
    .swatch-grid { display:flex;flex-wrap:wrap;gap:7px; }
    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: all 0.15s;
      position: relative;
    }
    .swatch:hover { transform: scale(1.12); }
    .swatch.active { border-color: #fff; transform: scale(1.2); }
    .swatch.active::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: rgba(255,255,255,0.95);
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    /* Text inputs */
    .ctrl-section input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 9px 11px;
      color: #f9fafb;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      transition: border-color 0.15s, background 0.15s;
    }
    .ctrl-section input[type="text"]:focus {
      outline: none;
      border-color: rgba(226,185,111,0.55);
      background: rgba(255,255,255,0.08);
    }
    .ctrl-section input[type="text"]::placeholder { color: rgba(255,255,255,0.22); }

    /* Toggle */
    .toggle-row { display:flex;align-items:center;justify-content:space-between; }
    .toggle-text { font-size: 13px; color: rgba(255,255,255,0.65); }
    .toggle-pill {
      width: 38px; height: 21px;
      background: rgba(255,255,255,0.12);
      border-radius: 10.5px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-pill.on { background: #e2b96f; }
    .toggle-pill::after {
      content: '';
      position: absolute;
      width: 15px; height: 15px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: left 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .toggle-pill.on::after { left: 20px; }

    /* Download button */
    .btn-dl {
      width: 100%;
      padding: 12px 16px;
      background: #e2b96f;
      color: #1a0f00;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-dl:hover { opacity: 0.9; }
    .btn-dl:active { transform: scale(0.98); }
    .btn-dl:disabled { opacity: 0.42; cursor: not-allowed; transform: none; }
    .btn-hint { font-size: 10px; color: rgba(255,255,255,0.22); text-align: center; margin-top: 5px; }

    /* ===== PREVIEW AREA ===== */
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      gap: 10px;
    }
    .preview-label {
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .preview-clip {
      overflow: hidden;
      border-radius: 14px;
      box-shadow: 0 28px 80px rgba(0,0,0,0.72), 0 0 0 1px rgba(255,255,255,0.05);
      position: relative;
    }

    /* The 1080×1920 story container — scaled by JS */
    #story-frame {
      width: 1080px;
      height: 1920px;
      position: absolute;
      top: 0; left: 0;
      transform-origin: top left;
      overflow: hidden;
    }

    /* ===== STORY TEMPLATES ===== */
    .story {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
    }

    /* ── FULLBLEED ── */
    .s-fb .s-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
    }
    .s-fb .s-bg-empty {
      position: absolute; inset: 0;
    }
    .s-fb .s-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.0) 0%,
        rgba(0,0,0,0.04) 32%,
        rgba(0,0,0,0.52) 64%,
        rgba(0,0,0,0.88) 100%
      );
    }
    .s-fb .s-top-logo {
      position: absolute;
      top: 88px; left: 0; right: 0;
      display: flex; justify-content: center;
    }
    .s-fb .s-top-logo img { width: 180px; height: auto; }
    .s-fb .s-bottom {
      position: absolute;
      bottom: 108px; left: 84px; right: 84px;
    }
    .s-fb .s-headline {
      font-family: 'Playfair Display', serif;
      font-size: 108px; font-weight: 900;
      color: #fff; line-height: 1.04;
      margin-bottom: 36px;
      text-shadow: 0 4px 28px rgba(0,0,0,0.35);
    }
    .s-fb .s-subtext {
      font-family: 'Nunito', sans-serif;
      font-size: 54px; font-weight: 600;
      color: rgba(255,255,255,0.88);
      line-height: 1.35; margin-bottom: 64px;
    }
    .s-fb .s-cta {
      display: inline-block;
      border: 2.5px solid rgba(255,255,255,0.5);
      border-radius: 100px;
      padding: 26px 64px;
      font-family: 'Nunito', sans-serif;
      font-size: 42px; font-weight: 700;
      color: #fff;
      background: rgba(255,255,255,0.12);
    }

    /* ── SPLIT PANEL ── */
    .s-sp .s-photo-top {
      position: absolute;
      top: 0; left: 0; right: 0; height: 57%;
      overflow: hidden;
    }
    .s-sp .s-photo-top img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
    }
    .s-sp .s-photo-empty {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .s-sp .s-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 45%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 68px 88px 88px;
    }
    /* Rounded top overlap */
    .s-sp .s-panel::before {
      content: '';
      position: absolute;
      top: -52px; left: 0; right: 0; height: 60px;
      border-radius: 60px 60px 0 0;
      background: inherit;
    }
    .s-sp .s-panel-logo { width: 140px; margin-bottom: 48px; position: relative; z-index: 1; }
    .s-sp .s-headline {
      font-family: 'Playfair Display', serif;
      font-size: 96px; font-weight: 900;
      color: #fff; text-align: center;
      line-height: 1.08; margin-bottom: 30px;
      position: relative; z-index: 1;
    }
    .s-sp .s-subtext {
      font-family: 'Nunito', sans-serif;
      font-size: 50px; font-weight: 600;
      color: rgba(255,255,255,0.85);
      text-align: center; line-height: 1.3;
      margin-bottom: 48px;
      position: relative; z-index: 1;
    }
    .s-sp .s-cta {
      font-family: 'Nunito', sans-serif;
      font-size: 40px; font-weight: 700;
      color: rgba(255,255,255,0.62);
      text-align: center;
      position: relative; z-index: 1;
    }

    /* ── CARD ── */
    .s-cd .s-bg-blur {
      position: absolute;
      inset: -50px;
      width: calc(100% + 100px);
      height: calc(100% + 100px);
      object-fit: cover;
      filter: blur(52px) brightness(0.32) saturate(1.4);
    }
    .s-cd .s-bg-color { position: absolute; inset: 0; }
    .s-cd .s-card {
      position: absolute;
      top: 72px; bottom: 72px; left: 60px; right: 60px;
      background: #fff;
      border-radius: 52px;
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 52px 128px rgba(0,0,0,0.58);
    }
    .s-cd .s-card-photo { flex: 1.1; overflow: hidden; }
    .s-cd .s-card-photo img { width: 100%; height: 100%; object-fit: cover; }
    .s-cd .s-card-photo-empty {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .s-cd .s-card-body {
      flex: 0 0 auto;
      padding: 52px 68px 68px;
      display: flex; flex-direction: column; align-items: center;
    }
    .s-cd .s-card-logo { width: 110px; margin-bottom: 32px; filter: brightness(0); }
    .s-cd .s-headline {
      font-family: 'Playfair Display', serif;
      font-size: 84px; font-weight: 900;
      color: #111827; text-align: center;
      line-height: 1.1; margin-bottom: 28px;
    }
    .s-cd .s-subtext {
      font-family: 'Nunito', sans-serif;
      font-size: 44px; font-weight: 600;
      color: #6b7280; text-align: center;
      line-height: 1.35; margin-bottom: 36px;
    }
    .s-cd .s-cta {
      font-family: 'Nunito', sans-serif;
      font-size: 36px; font-weight: 700;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ── CONTROLS ── -->
<aside class="controls">
  <div class="ctrl-header">
    <h1>Story Builder</h1>
    <p>Pika Pika · Instagram Stories</p>
  </div>

  <div class="ctrl-body">

    <div class="ctrl-section">
      <div class="ctrl-label">Foto del producto</div>
      <div class="photo-drop" id="photoDrop">
        <div id="photoDropInner">
          <div class="drop-icon">📷</div>
          <div class="drop-text">Clic o arrastrá una foto</div>
          <div class="drop-hint">JPG · PNG · WEBP</div>
        </div>
      </div>
      <input type="file" id="photoInput" accept="image/*" style="display:none" />
    </div>

    <div class="ctrl-section">
      <div class="ctrl-label">Plantilla</div>
      <div class="layout-grid">
        <div class="layout-card active" data-layout="fullbleed">
          <div class="layout-thumb"><div class="lt-fullbleed"></div></div>
          <div class="layout-name">Fondo completo</div>
        </div>
        <div class="layout-card" data-layout="split">
          <div class="layout-thumb">
            <div class="lt-split">
              <div class="lt-split-photo"></div>
              <div class="lt-split-panel">
                <div class="lt-split-line1"></div>
                <div class="lt-split-line2"></div>
              </div>
            </div>
          </div>
          <div class="layout-name">Panel inferior</div>
        </div>
        <div class="layout-card" data-layout="card">
          <div class="layout-thumb">
            <div class="lt-card">
              <div class="lt-card-inner">
                <div class="lt-card-photo-t"></div>
                <div class="lt-card-text">
                  <div class="lt-card-line1"></div>
                  <div class="lt-card-line2"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="layout-name">Tarjeta blanca</div>
        </div>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-label">Color de acento</div>
      <div class="swatch-grid" id="swatchGrid">
        <div class="swatch active" data-color="#E8A045" style="background:#E8A045" title="Naranja"></div>
        <div class="swatch" data-color="#5B8A5C" style="background:#5B8A5C" title="Verde"></div>
        <div class="swatch" data-color="#4A7FC1" style="background:#4A7FC1" title="Azul"></div>
        <div class="swatch" data-color="#C4607A" style="background:#C4607A" title="Coral"></div>
        <div class="swatch" data-color="#7B5EA7" style="background:#7B5EA7" title="Violeta"></div>
        <div class="swatch" data-color="#E8748A" style="background:#E8748A" title="Rosa"></div>
        <div class="swatch" data-color="#2C8C6E" style="background:#2C8C6E" title="Esmeralda"></div>
        <div class="swatch" data-color="#1A1A2E" style="background:#1A1A2E;border:1.5px solid rgba(255,255,255,0.18)" title="Negro"></div>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-label">Título principal</div>
      <input type="text" id="headline" value="10% de descuento" placeholder="Ej: 10% de descuento" />
    </div>

    <div class="ctrl-section">
      <div class="ctrl-label">Subtítulo</div>
      <input type="text" id="subtext" value="En toda la tienda" placeholder="Ej: En toda la tienda" />
    </div>

    <div class="ctrl-section">
      <div class="ctrl-label">Pie / CTA</div>
      <input type="text" id="ctaText" value="Rocamora 35 · Gualeguaychú" placeholder="Ej: Visitanos en Rocamora 35" />
    </div>

    <div class="ctrl-section">
      <div class="toggle-row">
        <span class="toggle-text">Mostrar logo</span>
        <div class="toggle-pill on" id="logoToggle"></div>
      </div>
    </div>

  </div><!-- /ctrl-body -->

  <div class="ctrl-footer">
    <button class="btn-dl" id="downloadBtn">⬇ Descargar PNG 1080×1920</button>
    <div class="btn-hint">Ctrl + Enter</div>
  </div>
</aside>

<!-- ── PREVIEW ── -->
<main class="preview-area">
  <div class="preview-label">Vista previa · 1080 × 1920</div>
  <div class="preview-clip" id="previewClip">
    <div id="story-frame"></div>
  </div>
</main>

<script>
// ── STATE ──
let photoDataUrl = null;
let layout       = 'fullbleed';
let accentColor  = '#E8A045';
let showLogo     = true;

const LOGO_URL = '/static/logo.png';
const JOIN_URL = '{{ join_url }}';

// ── DOM ──
const storyFrame  = document.getElementById('story-frame');
const previewClip = document.getElementById('previewClip');
const photoDrop   = document.getElementById('photoDrop');
const photoInput  = document.getElementById('photoInput');
const logoToggle  = document.getElementById('logoToggle');

// ── PREVIEW SIZING ──
function sizePreview() {
  const margin = 72;
  const availH = window.innerHeight - margin;
  const availW = window.innerWidth - 296 - margin;
  const h = Math.min(availH, availW * (16 / 9));
  const w = h * (9 / 16);
  const scale = h / 1920;

  previewClip.style.width  = `${Math.round(w)}px`;
  previewClip.style.height = `${Math.round(h)}px`;
  storyFrame.style.transform = `scale(${scale})`;
}
sizePreview();
window.addEventListener('resize', sizePreview);

// ── HELPERS ──
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function emptyBox(cls, color, emoji = '📷') {
  return `<div class="${cls}" style="background:${color};display:flex;align-items:center;justify-content:center;">
    <span style="font-size:72px;opacity:0.22">${emoji}</span>
  </div>`;
}

function logoImg(cls) {
  return showLogo
    ? `<img class="${cls}" src="${LOGO_URL}" crossorigin="anonymous" />`
    : '';
}

// ── TEMPLATE: FULLBLEED ──
function renderFullbleed(hl, sub, cta) {
  const bg = photoDataUrl
    ? `<img class="s-bg" src="${photoDataUrl}" />`
    : `<div class="s-bg s-bg-empty" style="background:linear-gradient(145deg,${accentColor}55,${accentColor}18);"></div>`;

  storyFrame.innerHTML = `
    <div class="story s-fb">
      ${bg}
      <div class="s-gradient"></div>
      ${showLogo ? `<div class="s-top-logo"><img src="${LOGO_URL}" style="width:180px" crossorigin="anonymous"/></div>` : ''}
      <div class="s-bottom">
        ${hl  ? `<div class="s-headline">${esc(hl)}</div>`   : ''}
        ${sub ? `<div class="s-subtext">${esc(sub)}</div>`   : ''}
        ${cta ? `<div class="s-cta">${esc(cta)}</div>`       : ''}
      </div>
    </div>`;
}

// ── TEMPLATE: SPLIT PANEL ──
function renderSplit(hl, sub, cta) {
  const photo = photoDataUrl
    ? `<img src="${photoDataUrl}" />`
    : emptyBox('s-photo-empty', `${accentColor}18`);

  storyFrame.innerHTML = `
    <div class="story s-sp">
      <div class="s-photo-top">${photo}</div>
      <div class="s-panel" style="background:${accentColor};">
        ${showLogo ? `<img class="s-panel-logo" src="${LOGO_URL}" crossorigin="anonymous"/>` : ''}
        ${hl  ? `<div class="s-headline">${esc(hl)}</div>`  : ''}
        ${sub ? `<div class="s-subtext">${esc(sub)}</div>`  : ''}
        ${cta ? `<div class="s-cta">${esc(cta)}</div>`      : ''}
      </div>
    </div>`;
}

// ── TEMPLATE: CARD ──
function renderCard(hl, sub, cta) {
  const bgBlur = photoDataUrl
    ? `<img class="s-bg-blur" src="${photoDataUrl}" />`
    : `<div class="s-bg-color" style="background:${accentColor};opacity:0.55;"></div>`;

  const cardPhoto = photoDataUrl
    ? `<img src="${photoDataUrl}" />`
    : emptyBox('s-card-photo-empty', `${accentColor}22`);

  storyFrame.innerHTML = `
    <div class="story s-cd">
      ${bgBlur}
      <div class="s-card">
        <div class="s-card-photo">${cardPhoto}</div>
        <div class="s-card-body">
          ${showLogo ? `<img class="s-card-logo" src="${LOGO_URL}" crossorigin="anonymous"/>` : ''}
          ${hl  ? `<div class="s-headline">${esc(hl)}</div>`                    : ''}
          ${sub ? `<div class="s-subtext">${esc(sub)}</div>`                    : ''}
          ${cta ? `<div class="s-cta" style="color:${accentColor};">${esc(cta)}</div>` : ''}
        </div>
      </div>
    </div>`;
}

// ── RENDER DISPATCH ──
function render() {
  const hl  = document.getElementById('headline').value;
  const sub = document.getElementById('subtext').value;
  const cta = document.getElementById('ctaText').value;

  if      (layout === 'fullbleed') renderFullbleed(hl, sub, cta);
  else if (layout === 'split')     renderSplit(hl, sub, cta);
  else if (layout === 'card')      renderCard(hl, sub, cta);
}

// ── CONTROLS ──
document.querySelectorAll('.layout-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.layout-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    layout = card.dataset.layout;
    render();
  });
});

document.querySelectorAll('.swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    accentColor = sw.dataset.color;
    render();
  });
});

logoToggle.addEventListener('click', () => {
  showLogo = !showLogo;
  logoToggle.classList.toggle('on', showLogo);
  render();
});

['headline', 'subtext', 'ctaText'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});

// ── PHOTO UPLOAD ──
photoDrop.addEventListener('click', () => photoInput.click());
photoInput.addEventListener('change', e => {
  if (e.target.files[0]) loadPhoto(e.target.files[0]);
  e.target.value = '';
});

photoDrop.addEventListener('dragover', e => { e.preventDefault(); photoDrop.classList.add('dragover'); });
photoDrop.addEventListener('dragleave', () => photoDrop.classList.remove('dragover'));
photoDrop.addEventListener('drop', e => {
  e.preventDefault();
  photoDrop.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file?.type.startsWith('image/')) loadPhoto(file);
});

function loadPhoto(file) {
  const reader = new FileReader();
  reader.onload = e => {
    photoDataUrl = e.target.result;
    photoDrop.classList.add('has-photo');
    document.getElementById('photoDropInner').innerHTML = `
      <img class="photo-thumb" src="${photoDataUrl}" />
      <div class="drop-hint">Clic para cambiar</div>`;
    render();
  };
  reader.readAsDataURL(file);
}

// ── DOWNLOAD ──
document.getElementById('downloadBtn').addEventListener('click', downloadPng);
document.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') downloadPng(); });

async function downloadPng() {
  const btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Generando...';

  try {
    await document.fonts.ready;

    const canvas = await html2canvas(storyFrame, {
      width:           1080,
      height:          1920,
      scale:           1,
      useCORS:         true,
      allowTaint:      false,
      backgroundColor: null,
      logging:         false,
    });

    const a = document.createElement('a');
    a.download = `pika-story-${Date.now()}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();

  } catch (err) {
    console.error('[story-builder] download error:', err);
    alert('No se pudo generar la imagen: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '⬇ Descargar PNG 1080×1920';
  }
}

// ── INIT ──
render();
</script>
</body>
</html>
